<!DOCTYPE html>
<html>
<head>
    <title>Holi Surprise</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(45deg, #ff4e50, #f9d423);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        #clickBtn {
            padding: 18px 40px;
            font-size: 24px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #ff4e50;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #videoBox {
            display: none;
            text-align: center;
        }

        video {
            width: 90%;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<button id="clickBtn">🎉 Click Here 🎉</button>

<div id="videoBox">
    <video id="myVideo" controls playsinline>
        <source src="yourvideo.mp4" type="video/mp4">
    </video>
</div>

<script>
document.getElementById("clickBtn").addEventListener("click", function() {
    document.getElementById("clickBtn").style.display = "none";
    document.getElementById("videoBox").style.display = "block";

    var vid = document.getElementById("myVideo");
    vid.load();
    vid.play();
});
</script>

</body>
</html>
